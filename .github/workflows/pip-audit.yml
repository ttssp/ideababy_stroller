name: pip-audit

on:
  schedule:
    - cron: '0 0 1 * *'  # 每月 1 日 00:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/003-pA
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install pip-audit
        run: uv run pip install pip-audit

      - name: Run pip-audit (strict — fail on critical/high)
        # requirements-locked.txt 由 T002 生成，仅含 Linux 平台依赖（供应链扫描对象）
        # --strict：有任何 critical/high CVE 则退出码非 0
        run: uv run pip-audit -r requirements-locked.txt --strict
