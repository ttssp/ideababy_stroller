# alembic.ini — T002
# 结论: alembic 配置，SQLite URL 由 env.py 动态注入（来自 config.py 或 DECISION_LEDGER_DB_URL env var）
# 细节: script_location 指向项目内 alembic/ 目录; sqlalchemy.url 在 env.py 中覆盖
[alembic]
# alembic 脚本和 versions/ 目录位置
script_location = alembic

# sqlalchemy.url 占位，env.py 中会用 config.py 的 Settings.decision_ledger_home 覆盖
# 测试时通过 DECISION_LEDGER_DB_URL env var 覆盖
sqlalchemy.url = sqlite:///%(here)s/../decision_ledger/data.sqlite

# migration 文件格式
file_template = %%(rev)s_%%(slug)s

# 时区（日志用）
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
